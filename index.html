<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Semestre">
<title>Semestre</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --blue: #0095f6;
  --green: #22c55e;
  --yellow: #f59e0b;
  --red: #ef4444;
  --r: 14px;
}
body {
  --bg:#000; --surface:#1c1c1e; --surface2:#2c2c2e; --border:#3a3a3c;
  --text:#fff; --muted:#8e8e93; --topbg:rgba(0,0,0,.92);
}
body.light {
  --bg:#f2f2f7; --surface:#fff; --surface2:#f2f2f7; --border:#d1d1d6;
  --text:#000; --muted:#8e8e93; --topbg:rgba(242,242,247,.92);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;overflow:hidden;transition:background .2s,color .2s;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;}

/* ── TOPBAR ── */
.topbar{padding:calc(var(--safe-top) + 4px) 16px 0;background:var(--topbg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:20;flex-shrink:0;transition:background .2s,border-color .2s;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;height:44px;}
.topbar-left{display:flex;align-items:baseline;gap:7px;}
.topbar-title{font-size:22px;font-weight:900;letter-spacing:-.5px;color:var(--text);}
.sem-tag{font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap;pointer-events:none;user-select:none;}
.theme-btn{width:36px;height:20px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;position:relative;cursor:pointer;flex-shrink:0;}
.theme-knob{position:absolute;top:1px;left:1px;width:14px;height:14px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s;font-size:9px;display:flex;align-items:center;justify-content:center;}
body.light .theme-knob{transform:translateX(16px);background:#fbbf24;}
.tab-bar{display:flex;padding:8px 0 0;}
.tab-btn{flex:1;background:none;border:none;color:var(--muted);font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;padding:8px 2px 10px;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s;letter-spacing:.2px;}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);}

/* ── SCROLL ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);padding-bottom:calc(var(--safe-bottom) + 20px);transition:background .2s;}
.content::-webkit-scrollbar{display:none;}
.tab-panel{display:none;}
.tab-panel.active{display:block;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.sec{padding:18px 16px 8px;font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;}

/* ── CARDS ── */
.card{background:var(--surface);border-radius:var(--r);margin:0 12px 10px;overflow:hidden;transition:background .2s;animation:fadeUp .3s ease backwards;}
.card-head{display:flex;align-items:center;padding:12px 14px 10px;gap:10px;border-bottom:1px solid var(--border);transition:border-color .2s;}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:background .2s;}
.cname{font-size:14px;font-weight:800;line-height:1.2;}
.csub{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px;}
.cmeta{flex:1;min-width:0;}

/* ── GRID (horários) ── */
.grid-wrap{padding:0 12px 4px;}
.grid-card{background:var(--surface);border-radius:var(--r);overflow:hidden;margin-bottom:10px;transition:background .2s;animation:fadeUp .25s ease backwards;}
.grid-head{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px 10px;border-bottom:1px solid var(--border);transition:border-color .2s;}
.grid-name{font-size:15px;font-weight:900;}
.grid-room{font-size:11px;font-weight:700;color:var(--blue);}
.grid-prof{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}
.grid-chips{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px;}
.chip{background:var(--surface2);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:800;display:flex;align-items:center;gap:5px;transition:background .2s;}
.chip .cd{color:var(--blue);}
.chip .ct{color:var(--muted);}
.grid-bar-wrap{padding:0 14px 12px;}
.bar-row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;font-weight:700;}
.bar-bg{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;transition:background .2s;}
.bar-fill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1),background .3s;}

/* ── STATS ── */
.sum-strip{display:flex;gap:8px;padding:4px 12px 0;overflow-x:auto;scrollbar-width:none;}
.sum-strip::-webkit-scrollbar{display:none;}
.sc{flex-shrink:0;background:var(--surface);border-radius:12px;padding:8px 16px;text-align:center;transition:background .2s;}
.sc-v{font-size:18px;font-weight:900;line-height:1;}
.sc-l{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-top:3px;}

/* ── FALTAS ── */
.fb{padding:10px 14px 14px;}
.ftop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.finfo .lim{font-size:12px;color:var(--muted);font-weight:700;}
.finfo .rem{font-size:13px;font-weight:800;margin-top:3px;}
.ctr{display:flex;align-items:center;gap:12px;}
.cbtn{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:transform .12s;font-family:'Nunito',sans-serif;font-weight:300;line-height:1;}
.cbtn:active{transform:scale(.8);}
.cbtn.m{background:rgba(239,68,68,.15);color:var(--red);}
.cbtn.p{background:rgba(34,197,94,.12);color:var(--green);}
.cnum{font-size:28px;font-weight:900;min-width:48px;text-align:center;transition:color .2s;}
.cnum.ok{color:var(--green);}
.cnum.wn{color:var(--yellow);}
.cnum.dg{color:var(--red);}

/* ── NOTAS ── */
.nb{padding:10px 14px 14px;}
.glbl{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.grow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.gcell{display:flex;flex-direction:column;gap:4px;flex:1;min-width:56px;}
.gcell-lbl{font-size:10px;font-weight:800;color:var(--muted);text-align:center;letter-spacing:1px;text-transform:uppercase;}
.gcell-w{font-size:9px;color:var(--blue);text-align:center;font-weight:700;margin-top:-2px;}
.gi{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;text-align:center;padding:10px 4px;width:100%;outline:none;-webkit-appearance:none;transition:border-color .2s,background .2s,color .2s;}
.gi:focus{border-color:var(--blue);}
.avg-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0 0;border-top:1px solid var(--border);transition:border-color .2s;}
.avg-lbl{font-size:12px;font-weight:800;color:var(--muted);}
.avg-val{font-size:20px;font-weight:900;color:var(--blue);}
.conc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0 0;border-top:1px solid var(--border);transition:border-color .2s;}
.conc-lbl{font-size:13px;font-weight:800;color:var(--muted);}
.conc-badge{font-size:26px;font-weight:900;min-width:44px;text-align:center;transition:color .3s;}

/* ── CONFIG ── */
.cfg-section{padding:0 12px;}
.cfg-card{background:var(--surface);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:background .2s;animation:fadeUp .3s ease backwards;}
.cfg-head{display:flex;align-items:center;padding:14px;gap:10px;cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s;}
.cfg-head.open{border-bottom-color:var(--border);}
.cfg-emo{width:36px;height:36px;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:background .2s;}
.cfg-subj-name{font-size:14px;font-weight:800;flex:1;}
.cfg-subj-sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px;}
.chev{font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.chev.open{transform:rotate(180deg);}
.cfg-body{display:none;padding:14px;border-top:1px solid var(--border);transition:border-color .2s;}
.cfg-body.open{display:block;}
.cfg-field{margin-bottom:14px;}
.cfg-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.cfg-inp{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:10px 12px;width:100%;outline:none;-webkit-appearance:none;transition:border-color .2s,background .2s,color .2s;}
.cfg-inp:focus{border-color:var(--blue);}
.cfg-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cfg-row-lbl .cl{font-size:13px;font-weight:700;}
.cfg-row-lbl .cs{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}
.stepper{display:flex;align-items:center;gap:10px;}
.stbtn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;font-family:'Nunito',sans-serif;line-height:1;}
.stbtn:active{transform:scale(.82);background:var(--border);}
.stval{font-size:18px;font-weight:900;min-width:28px;text-align:center;}
.div{height:1px;background:var(--border);margin:12px 0;transition:background .2s;}

/* weight grid */
.w-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.w-cell{display:flex;flex-direction:column;gap:4px;flex:1;min-width:56px;}
.w-lbl{font-size:10px;font-weight:800;color:var(--muted);text-align:center;letter-spacing:1px;text-transform:uppercase;}
.w-inp{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--blue);font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;text-align:center;padding:8px 4px;width:100%;outline:none;-webkit-appearance:none;}
.w-inp:focus{border-color:var(--blue);}

/* schedule chips in config */
.sched-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.sched-chip{background:var(--surface2);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:800;display:flex;align-items:center;gap:6px;transition:background .2s;}
.sched-x{color:var(--red);cursor:pointer;font-size:14px;line-height:1;}
.add-sched{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.sel{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:8px 10px;outline:none;-webkit-appearance:none;cursor:pointer;}
.cfg-txt{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:8px 10px;outline:none;width:80px;}
.btn{display:flex;align-items:center;justify-content:center;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:all .15s;padding:10px 16px;}
.btn:active{transform:scale(.96);}
.btn-blue{background:rgba(0,149,246,.15);color:var(--blue);}
.btn-red{background:rgba(239,68,68,.12);color:var(--red);}
.btn-green{background:rgba(34,197,94,.12);color:var(--green);}
.btn-block{width:100%;}
.btn-row{display:flex;gap:8px;}

/* general config card */
.gen-card{background:var(--surface);border-radius:var(--r);margin:0 12px 10px;padding:16px;transition:background .2s;}
.gen-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);transition:border-color .2s;}
.gen-row:last-child{border-bottom:none;padding-bottom:0;}
.gen-lbl{font-size:14px;font-weight:800;}
.gen-sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px;}

input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}

/* modal overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px calc(var(--safe-bottom)+20px);width:100%;max-width:430px;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-title{font-size:16px;font-weight:900;margin-bottom:16px;}
.sheet-inp{background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;padding:12px;width:100%;outline:none;margin-bottom:12px;}
.sheet-inp:focus{border-color:var(--blue);}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="topbar-left">
        <div class="topbar-title">Semestre</div>
        <span class="sem-tag" id="sem-tag"></span>
      </div>
      <div class="theme-btn" onclick="toggleTheme()">
        <div class="theme-knob" id="theme-knob">☀</div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('home',this)">Horários</button>
      <button class="tab-btn" onclick="switchTab('faltas',this)">Faltas</button>
      <button class="tab-btn" onclick="switchTab('notas',this)">Notas</button>
      <button class="tab-btn" onclick="switchTab('config',this)">⚙ Config</button>
    </div>
  </div>

  <div class="content">
    <!-- HORÁRIOS -->
    <div class="tab-panel active" id="tab-home">
      <div class="sec">Resumo</div>
      <div class="sum-strip" id="home-sum"></div>
      <div class="sec" style="padding-top:14px">Disciplinas</div>
      <div class="grid-wrap" id="grid-wrap"></div>
    </div>

    <!-- FALTAS -->
    <div class="tab-panel" id="tab-faltas">
      <div class="sec">Controle de Faltas</div>
      <div id="faltas-list"></div>
    </div>

    <!-- NOTAS -->
    <div class="tab-panel" id="tab-notas">
      <div class="sec">Notas &amp; Conceitos</div>
      <div id="notas-list"></div>
    </div>

    <!-- CONFIG -->
    <div class="tab-panel" id="tab-config">
      <div class="sec">Geral</div>
      <div class="gen-card">
        <div class="gen-row">
          <div><div class="gen-lbl">Semestre Atual</div><div class="gen-sub">Ex: 2025/1, 2º ano…</div></div>
          <button class="btn btn-blue" onclick="editSemLabel()">Editar</button>
        </div>
        <div class="gen-row">
          <div><div class="gen-lbl">Exportar Dados</div><div class="gen-sub">Baixar backup JSON</div></div>
          <button class="btn btn-blue" onclick="exportData()">Exportar</button>
        </div>
        <div class="gen-row">
          <div><div class="gen-lbl">Importar Dados</div><div class="gen-sub">Restaurar de backup</div></div>
          <button class="btn btn-green" onclick="document.getElementById('import-file').click()">Importar</button>
        </div>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">

      <div class="sec" style="padding-top:4px">Disciplinas</div>
      <div style="padding:0 12px 10px">
        <button class="btn btn-green btn-block" onclick="addSubject()">+ Nova Disciplina</button>
      </div>
      <div class="cfg-section" id="cfg-list"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" style="display:none" onclick="closeModalOut(event)">
  <div class="sheet" id="modal-sheet">
    <div class="sheet-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* ── DEFAULT DATA ── */
const DEFAULT_SUBJECTS = [
  {id:'geo', name:'Geo Hum e Eco', room:'PB-042', prof:'Wagner Nabarro', maxF:4, emoji:'🌍', schedule:[{day:'Terça',time:'14h00'},{day:'Terça',time:'18h30'}]},
  {id:'eco', name:'Eco Int II',    room:'PB-052', prof:'Marcos Falleiro',maxF:8, emoji:'📈', schedule:[{day:'Quinta',time:'18h30'}]},
  {id:'aci', name:'ACI',           room:'PB-041', prof:'Andrés',         maxF:4, emoji:'🤝', schedule:[{day:'Quinta',time:'14h00'}]},
  {id:'asia',name:'RI Ásia',       room:'FCE-307',prof:'Zé Miguel',      maxF:4, emoji:'🗺️', schedule:[{day:'Sexta',time:'14h00'}]},
];

function defaultState() {
  const s = {
    theme:'dark', semesterLabel:'2025/1',
    subjects: JSON.parse(JSON.stringify(DEFAULT_SUBJECTS)),
    faltas:{}, notas:{}, config:{}
  };
  s.subjects.forEach(sub => {
    s.faltas[sub.id] = 0;
    s.notas[sub.id] = {conceito:''};
    s.config[sub.id] = {provas:2, trabalhos:2, weights:{}};
  });
  s.faltas.eco = 1; s.faltas.asia = 1;
  return s;
}

function load() {
  try { const r=localStorage.getItem('sem_v5'); if(r) return JSON.parse(r); } catch(e){}
  return defaultState();
}
function save() { localStorage.setItem('sem_v5', JSON.stringify(state)); }

let state = load();
if(!state.subjects) { state = defaultState(); }

/* ── THEME ── */
function applyTheme() { document.body.classList.toggle('light', state.theme==='light'); }
function toggleTheme() { state.theme = state.theme==='dark'?'light':'dark'; applyTheme(); save(); }
applyTheme();

/* ── SEM LABEL ── */
function renderSemTag() {
  const el=document.getElementById('sem-tag'); if(el) el.textContent = state.semesterLabel || '2025/1';
}
function editSemLabel() {
  openModal('Semestre Atual', `
    <input class="sheet-inp" id="sem-inp" type="text" placeholder="Ex: 2025/1" value="${state.semesterLabel||''}">
    <button class="btn btn-blue btn-block" onclick="saveSemLabel()">Salvar</button>
  `);
  setTimeout(()=>document.getElementById('sem-inp')?.focus(),100);
}
function saveSemLabel() {
  const v = document.getElementById('sem-inp').value.trim();
  if(v) { state.semesterLabel = v; save(); renderSemTag(); }
  closeModal();
}
renderSemTag();

/* ── TABS ── */
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

/* ── HELPERS ── */
function lerpColor(a,b,t){
  const ah=[a.slice(1,3),a.slice(3,5),a.slice(5,7)].map(h=>parseInt(h,16));
  const bh=[b.slice(1,3),b.slice(3,5),b.slice(5,7)].map(h=>parseInt(h,16));
  const r=ah.map((v,i)=>Math.round(v+(bh[i]-v)*t));
  return`rgb(${r[0]},${r[1]},${r[2]})`;
}
function absColor(f,m){
  const p=Math.min(f/m,1);
  if(p<=0) return '#22c55e';
  if(p<=0.5) return lerpColor('#22c55e','#f59e0b',p/0.5);
  return lerpColor('#f59e0b','#ef4444',(p-0.5)/0.5);
}
function absClass(f,m){const p=f/m;return p>=1?'dg':p>=.75?'wn':'ok';}

function cfg(id){return state.config[id]||(state.config[id]={provas:2,trabalhos:2,weights:{}});}

function calcAvg(id) {
  const n=state.notas[id]||{};const c=cfg(id);const w=c.weights||{};
  let sum=0,ws=0;
  for(let i=1;i<=c.provas;i++){const k='p'+i;const v=parseFloat(n[k]);const wv=parseFloat(w[k])||0;if(!isNaN(v)&&wv>0){sum+=v*wv;ws+=wv;}}
  for(let i=1;i<=c.trabalhos;i++){const k='t'+i;const v=parseFloat(n[k]);const wv=parseFloat(w[k])||0;if(!isNaN(v)&&wv>0){sum+=v*wv;ws+=wv;}}
  if(ws===0){let s2=0,cnt=0;for(let i=1;i<=c.provas;i++){const v=parseFloat(n['p'+i]);if(!isNaN(v)){s2+=v;cnt++;}}for(let i=1;i<=c.trabalhos;i++){const v=parseFloat(n['t'+i]);if(!isNaN(v)){s2+=v;cnt++;}}return cnt>0?(s2/cnt).toFixed(1):'—';}
  return(sum/ws).toFixed(1);
}
function totalWeight(id){const c=cfg(id);const w=c.weights||{};let t=0;for(let i=1;i<=c.provas;i++)t+=parseFloat(w['p'+i])||0;for(let i=1;i<=c.trabalhos;i++)t+=parseFloat(w['t'+i])||0;return Math.round(t);}
function calcConceito(id){
  const s=state.subjects.find(x=>x.id===id);
  if(s&&(state.faltas[id]||0)>s.maxF) return 'FF';
  const avg=calcAvg(id); if(avg==='—') return '—';
  const v=parseFloat(avg);
  if(v>=9) return 'A';
  if(v>=7.5) return 'B';
  if(v>=6) return 'C';
  return 'D';
}
function conceitoColor(c){return c==='FF'||c==='D'?'var(--red)':c==='C'?'var(--yellow)':c==='B'?'var(--blue)':c==='A'?'var(--green)':'var(--muted)';}

/* ── MODAL ── */
function openModal(title, bodyHtml) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }
function closeModalOut(e) { if(e.target.id==='modal') closeModal(); }

/* ── EXPORT / IMPORT ── */
function exportData() {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `semestre_${state.semesterLabel||'backup'}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function importData(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if(!parsed.subjects) throw new Error('inválido');
      state = parsed; save();
      renderSemTag(); applyTheme();
      buildAll();
      openModal('✅ Importado!', `<p style="color:var(--muted);font-size:14px;margin-bottom:14px;">Dados carregados com sucesso para <strong style="color:var(--text)">${state.semesterLabel}</strong>.</p><button class="btn btn-blue btn-block" onclick="closeModal()">OK</button>`);
    } catch(err) {
      openModal('❌ Erro', `<p style="color:var(--muted);font-size:14px;margin-bottom:14px;">Arquivo inválido. Use um backup gerado por este app.</p><button class="btn btn-red btn-block" onclick="closeModal()">Fechar</button>`);
    }
    e.target.value='';
  };
  reader.readAsText(file);
}

/* ── HOME ── */
function buildHome() {
  const totalF = state.subjects.reduce((a,s)=>a+(state.faltas[s.id]||0),0);
  const atRisk = state.subjects.filter(s=>(state.faltas[s.id]||0)/s.maxF>=.75).length;
  document.getElementById('home-sum').innerHTML = `
    <div class="sc"><div class="sc-v">${state.subjects.length}</div><div class="sc-l">Matérias</div></div>
    <div class="sc"><div class="sc-v" style="color:var(--red)">${totalF}</div><div class="sc-l">Faltas</div></div>
    <div class="sc"><div class="sc-v" style="color:${atRisk>0?'var(--yellow)':'var(--green)'}">${atRisk}</div><div class="sc-l">Em risco</div></div>
  `;
  const wrap = document.getElementById('grid-wrap');
  wrap.innerHTML = '';
  state.subjects.forEach((s,i) => {
    const f = state.faltas[s.id]||0;
    const pct = Math.min(f/s.maxF,1);
    const bc = absColor(f,s.maxF);
    const chips = s.schedule.map(sl=>`<div class="chip"><span class="cd">${sl.day.substring(0,3)}</span><span class="ct">${sl.time}</span></div>`).join('') || `<div class="chip" style="color:var(--muted)">Sem horário</div>`;
    const el = document.createElement('div');
    el.className='grid-card'; el.style.animationDelay=(i*.07)+'s';
    el.innerHTML=`
      <div class="grid-head">
        <div><div class="grid-name">${s.emoji} ${s.name}</div><div class="grid-prof">${s.prof}</div></div>
        <div class="grid-room">${s.room}</div>
      </div>
      <div class="grid-chips">${chips}</div>
      <div class="grid-bar-wrap">
        <div class="bar-row"><span style="color:var(--muted)">${f} falta${f!==1?'s':''} de ${s.maxF}</span><span style="color:${bc};font-weight:800">${Math.round(pct*100)}%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct*100}%;background:${bc}"></div></div>
      </div>`;
    wrap.appendChild(el);
  });
}

/* ── FALTAS ── */
function buildFaltas() {
  const list = document.getElementById('faltas-list');
  list.innerHTML='';
  state.subjects.forEach((s,i) => {
    const f=state.faltas[s.id]||0;
    const pct=Math.min(f/s.maxF,1);
    const remain=Math.max(s.maxF-f,0);
    const bc=absColor(f,s.maxF); const nc=absClass(f,s.maxF);
    const el=document.createElement('div'); el.className='card'; el.style.animationDelay=(i*.07)+'s';
    el.innerHTML=`
      <div class="card-head">
        <div class="avatar">${s.emoji}</div>
        <div class="cmeta"><div class="cname">${s.name}</div><div class="csub">${s.room} · ${s.prof}</div></div>
      </div>
      <div class="fb">
        <div class="ftop">
          <div class="finfo">
            <div class="lim">Limite: ${s.maxF} faltas</div>
            <div class="rem" id="rem-${s.id}" style="color:${bc}">${remain===0?'⛔ Limite atingido!':remain+` restante${remain!==1?'s':''}`}</div>
          </div>
          <div class="ctr">
            <button class="cbtn m" onclick="changeAbs('${s.id}',-1)">−</button>
            <div class="cnum ${nc}" id="cn-${s.id}">${f}</div>
            <button class="cbtn p" onclick="changeAbs('${s.id}',1)">+</button>
          </div>
        </div>
        <div class="bar-bg"><div class="bar-fill" id="bf-${s.id}" style="width:${pct*100}%;background:${bc}"></div></div>
      </div>`;
    list.appendChild(el);
  });
}

function changeAbs(id,delta) {
  const s=state.subjects.find(x=>x.id===id); if(!s) return;
  state.faltas[id]=Math.max(0,(state.faltas[id]||0)+delta); save();
  const f=state.faltas[id]; const pct=Math.min(f/s.maxF,1);
  const bc=absColor(f,s.maxF); const nc=absClass(f,s.maxF);
  const remain=Math.max(s.maxF-f,0);
  const el=document.getElementById('cn-'+id); if(el){el.textContent=f;el.className='cnum '+nc;}
  const bf=document.getElementById('bf-'+id); if(bf){bf.style.width=(pct*100)+'%';bf.style.background=bc;}
  const rm=document.getElementById('rem-'+id); if(rm){rm.style.color=bc;rm.textContent=remain===0?'⛔ Limite atingido!':remain+` restante${remain!==1?'s':''}`;}
  if(navigator.vibrate) navigator.vibrate(12);
  refreshConceito(id);
  buildHome();
}

/* ── NOTAS ── */
function buildNotas() {
  const list=document.getElementById('notas-list'); list.innerHTML='';
  state.subjects.forEach((s,i) => {
    const n=state.notas[s.id]||{}; const c=cfg(s.id); const w=c.weights||{};
    const avg=calcAvg(s.id);
    let provasHtml='', trabsHtml='';
    if(c.provas>0){
      provasHtml=`<div class="glbl">Provas</div><div class="grow">`+
        Array.from({length:c.provas},(_,k)=>{const key='p'+(k+1);const wv=parseFloat(w[key])||0;return`<div class="gcell">
          <div class="gcell-lbl">P${k+1}</div>
          <div class="gcell-w">${wv>0?wv+'%':'sem peso'}</div>
          <input class="gi" type="number" min="0" max="10" step="0.1" placeholder="—" value="${n[key]||''}"
            oninput="saveNote('${s.id}','${key}',this.value)">
        </div>`}).join('')+`</div>`;
    }
    if(c.trabalhos>0){
      trabsHtml=`<div class="glbl" style="margin-top:${c.provas>0?'6px':'0'}">Trabalhos</div><div class="grow">`+
        Array.from({length:c.trabalhos},(_,k)=>{const key='t'+(k+1);const wv=parseFloat(w[key])||0;return`<div class="gcell">
          <div class="gcell-lbl">T${k+1}</div>
          <div class="gcell-w">${wv>0?wv+'%':'sem peso'}</div>
          <input class="gi" type="number" min="0" max="10" step="0.1" placeholder="—" value="${n[key]||''}"
            oninput="saveNote('${s.id}','${key}',this.value)">
        </div>`}).join('')+`</div>`;
    }
    const el=document.createElement('div'); el.className='card'; el.style.animationDelay=(i*.07)+'s';
    el.innerHTML=`
      <div class="card-head">
        <div class="avatar">${s.emoji}</div>
        <div class="cmeta"><div class="cname">${s.name}</div><div class="csub">${s.prof}</div></div>
      </div>
      <div class="nb">
        ${provasHtml}${trabsHtml}
        <div class="avg-row">
          <div class="avg-lbl">Média Ponderada</div>
          <div class="avg-val" id="avg-${s.id}">${avg}</div>
        </div>
        <div class="conc-row">
          <div class="conc-lbl">Conceito Final</div>
          <div class="conc-badge" id="conc-${s.id}" style="color:${conceitoColor(calcConceito(s.id))}">${calcConceito(s.id)}</div>
        </div>
      </div>`;
    list.appendChild(el);
  });
}

function saveNote(id,key,val) {
  if(!state.notas[id]) state.notas[id]={};
  state.notas[id][key]=val; save();
  const avgEl=document.getElementById('avg-'+id);
  if(avgEl) avgEl.textContent=calcAvg(id);
  refreshConceito(id);
}
function refreshConceito(id){
  const el=document.getElementById('conc-'+id); if(!el) return;
  const c=calcConceito(id);
  el.textContent=c; el.style.color=conceitoColor(c);
}

/* ── CONFIG ── */
const DAYS=['Segunda','Terça','Quarta','Quinta','Sexta'];

function buildConfig() {
  const list=document.getElementById('cfg-list'); list.innerHTML='';
  state.subjects.forEach((s,i) => {
    const c=cfg(s.id); const w=c.weights||{};
    const schedChips=s.schedule.map((sl,si)=>
      `<div class="sched-chip"><span style="color:var(--blue);font-weight:800">${sl.day.substring(0,3)}</span><span style="color:var(--muted)">${sl.time}</span><span class="sched-x" onclick="removeSlot('${s.id}',${si})">×</span></div>`
    ).join('');

    // weight rows
    const tot=totalWeight(s.id);
    const totColor=tot===100?'var(--green)':tot>100?'var(--red)':'var(--muted)';
    const totLabel=(c.provas>0||c.trabalhos>0)?`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><div class="cfg-label" style="margin-bottom:0">Pesos (%)</div><span class="w-total" style="font-size:12px;font-weight:800;color:${totColor}">${tot}% de 100%</span></div>`:'';
    const pWeights = c.provas>0 ? `<div class="w-grid" style="margin-bottom:8px">`+
      Array.from({length:c.provas},(_,k)=>{const key='p'+(k+1);return`<div class="w-cell"><div class="w-lbl">P${k+1}</div><div style="position:relative"><input class="w-inp" type="number" min="0" max="100" step="1" placeholder="0" value="${w[key]||''}" oninput="saveWeight('${s.id}','${key}',this.value)" style="padding-right:20px"><span style="position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--blue);font-weight:800;pointer-events:none">%</span></div></div>`}).join('')+`</div>` : '';
    const tWeights = c.trabalhos>0 ? `<div class="w-grid">`+
      Array.from({length:c.trabalhos},(_,k)=>{const key='t'+(k+1);return`<div class="w-cell"><div class="w-lbl">T${k+1}</div><div style="position:relative"><input class="w-inp" type="number" min="0" max="100" step="1" placeholder="0" value="${w[key]||''}" oninput="saveWeight('${s.id}','${key}',this.value)" style="padding-right:20px"><span style="position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--blue);font-weight:800;pointer-events:none">%</span></div></div>`}).join('')+`</div>` : '';
    const weightsSection = (c.provas>0||c.trabalhos>0) ? `${totLabel}${pWeights}${tWeights}<div class="div"></div>` : '';

    const card=document.createElement('div'); card.className='cfg-card'; card.style.animationDelay=(i*.06)+'s';
    card.innerHTML=`
      <div class="cfg-head" id="cfgh-${s.id}" onclick="toggleCfg('${s.id}')">
        <div class="cfg-emo" id="cfgemo-${s.id}">${s.emoji}</div>
        <div style="flex:1;min-width:0">
          <div class="cfg-subj-name">${s.name}</div>
          <div class="cfg-subj-sub">${s.room} · ${s.prof}</div>
        </div>
        <div class="chev" id="cfgchev-${s.id}">▼</div>
      </div>
      <div class="cfg-body" id="cfgb-${s.id}">
        <!-- Basic info -->
        <div class="cfg-field">
          <div class="cfg-label">Emoji</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:0">
            ${['🌍','📈','🤝','🗺️','📚','🔬','⚖️','💡','🎓','🏛️','📐','🌐','💼','🖥️','🧮'].map(e=>
              `<span style="font-size:22px;cursor:pointer;padding:4px;border-radius:8px;background:${s.emoji===e?'var(--surface2)':'transparent'}" onclick="setEmoji('${s.id}','${e}')" id="em-${s.id}-${e}">${e}</span>`
            ).join('')}
          </div>
        </div>
        <div class="div"></div>
        <div class="cfg-field">
          <div class="cfg-label">Nome da Disciplina</div>
          <input class="cfg-inp" type="text" value="${s.name}" oninput="updateSubj('${s.id}','name',this.value)">
        </div>
        <div class="cfg-field">
          <div class="cfg-label">Sala</div>
          <input class="cfg-inp" type="text" value="${s.room}" oninput="updateSubj('${s.id}','room',this.value)">
        </div>
        <div class="cfg-field">
          <div class="cfg-label">Professor</div>
          <input class="cfg-inp" type="text" value="${s.prof}" oninput="updateSubj('${s.id}','prof',this.value)">
        </div>
        <div class="div"></div>
        <!-- Faltas limit -->
        <div class="cfg-row">
          <div class="cfg-row-lbl"><div class="cl">Limite de Faltas</div></div>
          <div class="stepper">
            <button class="stbtn" onclick="stepMaxF('${s.id}',-1)">−</button>
            <div class="stval" id="smf-${s.id}">${s.maxF}</div>
            <button class="stbtn" onclick="stepMaxF('${s.id}',1)">+</button>
          </div>
        </div>
        <div class="div"></div>
        <!-- Provas / Trabalhos count -->
        <div class="cfg-row">
          <div class="cfg-row-lbl"><div class="cl">Provas</div><div class="cs">P1, P2…</div></div>
          <div class="stepper">
            <button class="stbtn" onclick="stepCfg('${s.id}','provas',-1)">−</button>
            <div class="stval" id="sp-${s.id}">${c.provas}</div>
            <button class="stbtn" onclick="stepCfg('${s.id}','provas',1)">+</button>
          </div>
        </div>
        <div class="cfg-row" style="margin-top:4px">
          <div class="cfg-row-lbl"><div class="cl">Trabalhos</div><div class="cs">T1, T2…</div></div>
          <div class="stepper">
            <button class="stbtn" onclick="stepCfg('${s.id}','trabalhos',-1)">−</button>
            <div class="stval" id="st-${s.id}">${c.trabalhos}</div>
            <button class="stbtn" onclick="stepCfg('${s.id}','trabalhos',1)">+</button>
          </div>
        </div>
        <div class="div"></div>
        <!-- Weights -->
        ${weightsSection}
        <!-- Schedule -->
        <div class="cfg-label">Horários</div>
        <div class="sched-chips" id="schips-${s.id}">${schedChips||'<span style="font-size:12px;color:var(--muted)">Nenhum horário</span>'}</div>
        <div class="add-sched">
          <select class="sel" id="sday-${s.id}">
            ${DAYS.map(d=>`<option value="${d}">${d}</option>`).join('')}
          </select>
          <input class="cfg-txt" type="text" placeholder="14h00" id="stime-${s.id}" maxlength="7">
          <button class="btn btn-blue" onclick="addSlot('${s.id}')">+ Add</button>
        </div>
        <div class="div"></div>
        <!-- Delete -->
        <button class="btn btn-red btn-block" onclick="deleteSubject('${s.id}')">🗑 Remover Disciplina</button>
      </div>`;
    list.appendChild(card);
  });
}

function toggleCfg(id) {
  const head=document.getElementById('cfgh-'+id);
  const body=document.getElementById('cfgb-'+id);
  const chev=document.getElementById('cfgchev-'+id);
  const open=body.classList.toggle('open');
  head.classList.toggle('open',open);
  chev.classList.toggle('open',open);
}

function getOpenCards(){return state.subjects.map(s=>s.id).filter(id=>document.getElementById('cfgb-'+id)?.classList.contains('open'));}
function restoreOpenCards(ids){ids.forEach(id=>{const b=document.getElementById('cfgb-'+id);const h=document.getElementById('cfgh-'+id);const v=document.getElementById('cfgchev-'+id);if(b){b.classList.add('open');h?.classList.add('open');v?.classList.add('open');}});}

function updateSubj(id,key,val) {
  const s=state.subjects.find(x=>x.id===id); if(!s) return;
  s[key]=val; save(); buildHome(); buildFaltas(); buildNotas();
  // update config header inline without closing
  const nameEl=document.querySelector(`#cfgh-${id} .cfg-subj-name`);
  const subEl=document.querySelector(`#cfgh-${id} .cfg-subj-sub`);
  if(nameEl) nameEl.textContent=s.name;
  if(subEl) subEl.textContent=`${s.room} · ${s.prof}`;
}

function setEmoji(id,emo) {
  const s=state.subjects.find(x=>x.id===id); if(!s) return;
  s.emoji=emo; save();
  document.getElementById('cfgemo-'+id).textContent=emo;
  buildHome(); buildFaltas(); buildNotas();
}

function stepMaxF(id,delta) {
  const s=state.subjects.find(x=>x.id===id); if(!s) return;
  s.maxF=Math.max(1,Math.min(40,s.maxF+delta)); save();
  const el=document.getElementById('smf-'+id); if(el) el.textContent=s.maxF;
  if(navigator.vibrate) navigator.vibrate(8);
  buildFaltas(); buildHome(); refreshConceito(id);
}

function stepCfg(id,key,delta) {
  const c=cfg(id);
  c[key]=Math.max(0,Math.min(8,(c[key]||0)+delta)); save();
  const elId=key==='provas'?'sp-'+id:'st-'+id;
  const el=document.getElementById(elId); if(el) el.textContent=c[key];
  if(navigator.vibrate) navigator.vibrate(8);
  buildNotas();
  const open=getOpenCards();
  buildConfig();
  restoreOpenCards(open);
}

function saveWeight(id,key,val) {
  const c=cfg(id);
  if(!c.weights) c.weights={};
  const v=parseFloat(val);
  c.weights[key]=isNaN(v)?0:Math.min(100,Math.max(0,v));
  save();
  const avgEl=document.getElementById('avg-'+id);
  if(avgEl) avgEl.textContent=calcAvg(id);
  buildNotas();
  refreshConceito(id);
  // update just the total counter inline
  const tot=totalWeight(id);
  const totColor=tot===100?'var(--green)':tot>100?'var(--red)':'var(--muted)';
  const totEls=document.querySelectorAll(`#cfgb-${id} .w-total`);
  totEls.forEach(el=>{ el.textContent=`${tot}% de 100%`; el.style.color=totColor; });
}

function addSlot(id) {
  const s=state.subjects.find(x=>x.id===id); if(!s) return;
  const day=document.getElementById('sday-'+id)?.value;
  const time=document.getElementById('stime-'+id)?.value.trim();
  if(!day||!time) return;
  if(!s.schedule) s.schedule=[];
  s.schedule.push({day,time});
  save();
  // update chips inline
  const container=document.getElementById('schips-'+id);
  if(container) container.innerHTML=s.schedule.map((sl,si)=>
    `<div class="sched-chip"><span style="color:var(--blue);font-weight:800">${sl.day.substring(0,3)}</span><span style="color:var(--muted)">${sl.time}</span><span class="sched-x" onclick="removeSlot('${id}',${si})">×</span></div>`
  ).join('') || '<span style="font-size:12px;color:var(--muted)">Nenhum horário</span>';
  const timeInp=document.getElementById('stime-'+id); if(timeInp) timeInp.value='';
  buildHome();
}

function removeSlot(id,idx) {
  const s=state.subjects.find(x=>x.id===id); if(!s) return;
  s.schedule.splice(idx,1); save();
  const container=document.getElementById('schips-'+id);
  if(container) container.innerHTML=s.schedule.map((sl,si)=>
    `<div class="sched-chip"><span style="color:var(--blue);font-weight:800">${sl.day.substring(0,3)}</span><span style="color:var(--muted)">${sl.time}</span><span class="sched-x" onclick="removeSlot('${id}',${si})">×</span></div>`
  ).join('') || '<span style="font-size:12px;color:var(--muted)">Nenhum horário</span>';
  buildHome();
}

function addSubject() {
  const id='s'+Date.now();
  const newS={id, name:'Nova Disciplina', room:'—', prof:'—', maxF:4, emoji:'📚', schedule:[]};
  state.subjects.push(newS);
  state.faltas[id]=0; state.notas[id]={conceito:''};
  state.config[id]={provas:2,trabalhos:2,weights:{}};
  save(); buildAll();
  setTimeout(()=>{ const btn=document.getElementById('cfgh-'+id); if(btn) btn.scrollIntoView({behavior:'smooth'}); toggleCfg(id); },100);
}

function deleteSubject(id) {
  openModal('Remover Disciplina', `
    <p style="color:var(--muted);font-size:14px;margin-bottom:16px;">Tem certeza? Os dados de <strong style="color:var(--text)">${state.subjects.find(x=>x.id===id)?.name}</strong> serão apagados.</p>
    <div class="btn-row">
      <button class="btn btn-blue" style="flex:1" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-red" style="flex:1" onclick="confirmDelete('${id}')">Remover</button>
    </div>`);
}

function confirmDelete(id) {
  state.subjects=state.subjects.filter(x=>x.id!==id);
  delete state.faltas[id]; delete state.notas[id]; delete state.config[id];
  save(); closeModal(); buildAll();
}

/* ── BUILD ALL ── */
function buildAll(){ buildHome(); buildFaltas(); buildNotas(); buildConfig(); }
buildAll();
</script>
</body>
